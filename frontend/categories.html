<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标准分类管理</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { padding: 8px 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn:hover { background: #45a049; }
        .btn-danger { background: #f44336; }
        .btn-danger:hover { background: #d32f2f; }
        .btn-small { padding: 4px 8px; font-size: 12px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 6px; }
        .stat-item { text-align: center; flex: 1; }
        .stat-value { font-size: 24px; font-weight: bold; color: #2196F3; }
        .stat-label { font-size: 12px; color: #666; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-weight: bold; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; }
        .status-active { background: #e8f5e9; color: #2e7d32; }
        .status-inactive { background: #ffebee; color: #c62828; }
        .code-badge { background: #e3f2fd; color: #1565c0; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-family: monospace; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 8px; width: 90%; max-width: 500px; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .form-help { font-size: 12px; color: #666; margin-top: 4px; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 4px; margin-bottom: 15px; display: none; }
        .success { background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 4px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>标准分类管理</h1>
            <button class="btn" onclick="showAddModal()"><i class="fas fa-plus"></i> 添加分类</button>
        </div>
        
        <div class="stats">
            <div class="stat-item"><div class="stat-value" id="totalCategories">0</div><div class="stat-label">总分类数</div></div>
            <div class="stat-item"><div class="stat-value" id="activeCategories">0</div><div class="stat-label">启用中</div></div>
            <div class="stat-item"><div class="stat-value" id="inactiveCategories">0</div><div class="stat-label">已禁用</div></div>
        </div>
        
        <div id="errorMessage" class="error"></div>
        <div id="successMessage" class="success"></div>
        
        <div id="categoriesList" class="loading">正在加载分类列表...</div>
    </div>
    
    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">添加新分类</h2>
            <form id="categoryForm">
                <input type="hidden" id="categoryId">
                <div class="form-group">
                    <label>分类名称 *</label>
                    <input type="text" id="categoryName" class="form-input" required placeholder="例如：国家标准">
                </div>
                <div class="form-group">
                    <label>分类代码 *</label>
                    <input type="text" id="categoryCode" class="form-input" required placeholder="例如：national">
                    <div class="form-help">英文小写字母和数字，用于系统内部识别</div>
                </div>
                <div class="form-group">
                    <label>分类描述（可选）</label>
                    <textarea id="categoryDescription" class="form-input" rows="3" placeholder="简要描述"></textarea>
                </div>
                <div class="form-group">
                    <label>显示顺序</label>
                    <input type="number" id="sortOrder" class="form-input" value="0">
                    <div class="form-help">数字越小显示越靠前</div>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="isActive" checked> 启用该分类</label>
                </div>
            </form>
            <div style="text-align: right; margin-top: 20px;">
                <button class="btn" onclick="closeModal()" style="background: #666; margin-right: 10px;">取消</button>
                <button class="btn" onclick="saveCategory()" id="saveButton">保存</button>
            </div>
        </div>
    </div>
    
    <script>
        let currentCategoryId = null;
        
        document.addEventListener('DOMContentLoaded', loadCategories);
        
        async function loadCategories() {
            try {
                const response = await fetch('/api/categories?include_inactive=true');
                const result = await response.json();
                if (result.status === 'success') {
                    displayCategories(result.data);
                    updateStats(result.data);
                } else {
                    showError('加载失败: ' + result.message);
                }
            } catch (error) {
                showError('加载失败: ' + error.message);
            }
        }
        
        function displayCategories(categories) {
            const container = document.getElementById('categoriesList');
            if (!categories || categories.length === 0) {
                container.innerHTML = '<div class="loading">暂无分类数据</div>';
                return;
            }
            
            categories.sort((a, b) => a.sort_order - b.sort_order || a.id - b.id);
            
            let html = '<table><thead><tr><th>分类名称</th><th>代码</th><th>描述</th><th>状态</th><th>排序</th><th>操作</th></tr></thead><tbody>';
            
            categories.forEach(cat => {
                const status = cat.is_active ? 
                    '<span class="status-badge status-active">启用</span>' : 
                    '<span class="status-badge status-inactive">禁用</span>';
                const desc = cat.description ? escapeHtml(cat.description) : '-';
                html += `<tr>
                    <td><strong>${escapeHtml(cat.name)}</strong></td>
                    <td><span class="code-badge">${escapeHtml(cat.code)}</span></td>
                    <td title="${escapeHtml(cat.description || '')}">${desc.length > 30 ? desc.substring(0,30)+'...' : desc}</td>
                    <td>${status}</td>
                    <td>${cat.sort_order}</td>
                    <td>
                        <button class="btn btn-small" onclick="editCategory(${cat.id})"><i class="fas fa-edit"></i> 编辑</button>
                        <button class="btn btn-small btn-danger" onclick="deleteCategory(${cat.id}, '${escapeHtml(cat.name)}')"><i class="fas fa-trash"></i> 删除</button>
                    </td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function updateStats(categories) {
            const total = categories.length;
            const active = categories.filter(c => c.is_active).length;
            document.getElementById('totalCategories').textContent = total;
            document.getElementById('activeCategories').textContent = active;
            document.getElementById('inactiveCategories').textContent = total - active;
        }
        
        function showAddModal() {
            currentCategoryId = null;
            document.getElementById('modalTitle').textContent = '添加新分类';
            document.getElementById('saveButton').textContent = '保存';
            document.getElementById('categoryForm').reset();
            document.getElementById('categoryId').value = '';
            document.getElementById('isActive').checked = true;
            document.getElementById('sortOrder').value = 0;
            document.getElementById('categoryModal').style.display = 'flex';
        }
        
        async function editCategory(id) {
            try {
                const response = await fetch('/api/categories/' + id);
                const result = await response.json();
                if (result.status === 'success') {
                    const cat = result.data;
                    currentCategoryId = id;
                    document.getElementById('modalTitle').textContent = '编辑分类';
                    document.getElementById('saveButton').textContent = '更新';
                    document.getElementById('categoryId').value = cat.id;
                    document.getElementById('categoryName').value = cat.name;
                    document.getElementById('categoryCode').value = cat.code;
                    document.getElementById('categoryDescription').value = cat.description || '';
                    document.getElementById('sortOrder').value = cat.sort_order;
                    document.getElementById('isActive').checked = cat.is_active;
                    document.getElementById('categoryModal').style.display = 'flex';
                } else {
                    showError('获取失败: ' + result.message);
                }
            } catch (error) {
                showError('获取失败: ' + error.message);
            }
        }
        
        async function saveCategory() {
            const form = document.getElementById('categoryForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            
            const categoryData = {
                name: document.getElementById('categoryName').value.trim(),
                code: document.getElementById('categoryCode').value.trim(),
                description: document.getElementById('categoryDescription').value.trim(),
                sort_order: parseInt(document.getElementById('sortOrder').value),
                is_active: document.getElementById('isActive').checked
            };
            
            if (!/^[a-z][a-z0-9_]*$/.test(categoryData.code)) {
                showError('分类代码格式不正确，只能包含小写字母、数字和下划线，且必须以字母开头');
                return;
            }
            
            try {
                let response;
                if (currentCategoryId) {
                    response = await fetch('/api/categories/' + currentCategoryId, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: new URLSearchParams(categoryData)
                    });
                } else {
                    response = await fetch('/api/categories', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: new URLSearchParams(categoryData)
                    });
                }
                
                const result = await response.json();
                if (result.status === 'success') {
                    showSuccess(currentCategoryId ? '分类更新成功' : '分类创建成功');
                    closeModal();
                    loadCategories();
                } else {
                    showError(result.message || '保存失败');
                }
            } catch (error) {
                showError('保存失败: ' + error.message);
            }
        }
        
        async function deleteCategory(id, name) {
            if (!confirm('确定要删除分类 "' + name + '" 吗？\n\n注意：如果已有标准使用此分类，将无法删除。')) {
                return;
            }
            
            try {
                const response = await fetch('/api/categories/' + id, { method: 'DELETE' });
                const result = await response.json();
                if (result.status === 'success') {
                    showSuccess('分类已禁用');
                    loadCategories();
                } else {
                    showError(result.message || '删除失败');
                }
            } catch (error) {
                showError('删除失败: ' + error.message);
            }
        }
        
        function closeModal() {
            document.getElementById('categoryModal').style.display = 'none';
        }
        
        function showError(message) {
            const div = document.getElementById('errorMessage');
            div.textContent = message;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 5000);
        }
        
        function showSuccess(message) {
            const div = document.getElementById('successMessage');
            div.textContent = message;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 3000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        window.onclick = function(event) {
            if (event.target.id === 'categoryModal') {
                closeModal();
            }
        };
        
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
